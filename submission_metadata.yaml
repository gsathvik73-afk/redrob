# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Deterministic offline ranker for the released Senior AI Engineer JD. The
  system scans candidates once, extracts evidence for production search,
  retrieval, ranking, recommendation, vector infrastructure, evaluation
  literacy, hands-on recency, product-company background, location fit,
  availability, and trust/corroboration signals. It down-weights services-only
  histories, nontechnical AI keyword stuffing, CV/speech-heavy profiles without
  NLP/IR evidence, long notice periods, stale engagement, inflated skill claims,
  and honeypot-like consistency failures. The same feature values generate
  grounded reasoning strings. The full 100K ranking runs under 5 minutes on CPU.

