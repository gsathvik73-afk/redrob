methodology_summary: >
  Deterministic feature ranker for the Senior AI Engineer JD. The system rewards
  shipped ranking/search/retrieval/recommendation evidence, product-company ML
  background, evaluation literacy, location fit, availability, and corroborated
  assessments. It applies rule-based trust and anomaly gates for impossible
